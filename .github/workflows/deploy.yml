name: Deploy to Amazon ECR and EKS

on:
  push:
    branches: [ "main", "qa", "feature/*" ]

jobs:
  deploy:
    name: Build, Provision, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 2 # Required to compare the current commit with the previous one

    - name: Pull LFS files
      run: git lfs pull

    # Determine environment based on branch
    - name: Set Env
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
        else
            echo "ENV=qa" >> $GITHUB_ENV
        fi

    # Check if model-related files changed
    - name: Check for Model Changes
      id: model-changes
      uses: tj-actions/changed-files@v41
      with:
        # Compare current changes against the base branch (main or qa)
        base_sha: ${{ github.event.before }}
        files: |
         src/**
         weights/**
         Dockerfile

    - name: Set up Python for Testing
    #   if: steps.model-changes.outputs.any_changed == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Test Dependencies
    #   if: steps.model-changes.outputs.any_changed == 'true'
      run: |
        pip install torch torchvision pillow numpy opencv-python-headless

    - name: Run Model Smoke Test
      run: python -m tests.model_smoke_test

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image
      if: steps.model-changes.outputs.any_changed == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.ENV }} .

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init -upgrade

    - name: Terraform Plan
      id: plan
      working-directory: ./terraform
      run: |
        terraform init
        terraform workspace select ${{ env.ENV }} || terraform workspace new ${{ env.ENV }}
        terraform plan -var="env=${{ env.ENV }}" \
          -var="region=${{ secrets.AWS_REGION }}" \
         -var="image_tag=${{ env.ENV }}" \
         -var="ecr_repo_name=${{ secrets.ECR_REPOSITORY }}" \
         -var="commit_sha=${{ github.sha }}" \
          -var="ecr_url=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}"
      continue-on-error: false

    - name: Terraform Apply
      if: (env.ENV == 'prod' || env.ENV == 'qa') && github.event_name == 'push'
      working-directory: ./terraform
      run: |
        terraform init
        terraform apply -var="env=${{ env.ENV }}" -auto-approve \
          -var="region=${{ secrets.AWS_REGION }}" \
          -var="image_tag=${{ env.ENV }}" \
          -var="ecr_repo_name=${{ secrets.ECR_REPOSITORY }}" \
          -var="commit_sha=${{ github.sha }}" \
          -var="ecr_url=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}"

    # Installs kubectl on the runner engine
    - name: Setup kubectl
      if: (env.ENV == 'prod' || env.ENV == 'qa') && github.event_name == 'push'
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    # Authenticates kubectl context securely with fresh EKS Cluster
    - name: Update Kubeconfig Context
      if: (env.ENV == 'prod' || env.ENV == 'qa') && github.event_name == 'push'
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cell-dino-cluster

    - name: Substitute ECR Image URI in Manifest
      if: (env.ENV == 'prod' || env.ENV == 'qa') && github.event_name == 'push'
      run: |
        export IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ env.ENV }}"
        sed -i "s|__IMAGE_URI__|$IMAGE_URI|g" k8s/deployment.yaml

    # Deploys app structures straight to EKS Fargate
    - name: Deploy Manifests to EKS
      if: (env.ENV == 'prod' || env.ENV == 'qa') && github.event_name == 'push'
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/ingress.yaml